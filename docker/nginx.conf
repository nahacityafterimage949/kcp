# nginx config para KCP peer com SSL
# Usado com: docker compose --profile proxy up -d
# Substitua KCP_DOMAIN pelo domínio real e ajuste o caminho do certificado

server {
    listen 80;
    server_name KCP_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name KCP_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/KCP_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/KCP_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # KCP API
    location /kcp/ {
        proxy_pass         http://kcp-peer:8800;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # Web dashboard UI
    location /ui {
        proxy_pass http://kcp-peer:8800;
        proxy_set_header Host $host;
    }

    # Health check público
    location = /health {
        proxy_pass http://kcp-peer:8800/kcp/v1/health;
    }
}
